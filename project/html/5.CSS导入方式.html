<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS导入方式</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        p{
            color: red;
            font-size: 23px;
        }
        h2{
            color: rgb(126, 167, 167);
        }
    </style>
</head>
<body>
    <p>这是一个应用了css文本的标签</p>
    <h1 style="color: aqua;">这是一级标题标签,应用内联样式</h1>
    <h2>这是二级标题标签，应用内部样式</h2>
    <h3>这是一个三级标题标签，应用外部样式</h3>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css盒子模型</title>
    <style>
        .demo{
            background-color: beige;
            display: inline-block;
            border: 5px solid rgb(127, 209, 220);
            padding: 50px;
            margin: 40px;
        }
        .border-demo{
            background-color: aquamarine;
            width: 500px;
            height: 300px;
            border-style: solid dashed dotted double;
            border-width: 5px 12px 20px 0;
            border-color: rgb(75, 75, 113);
        }
    </style>
</head>

<body>
    <div class="demo">不知道该写啥</div>
    <div class="border-demo">这是一个边框示例</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css浮动</title>
    <style>
        .father{
            background-color: aquamarine;
            /* height: 150px; */
            /* overflow: hidden; */
        }
        .father::after{
            content: "";
            display: table;
            clear: both;
        }
        .left-son{
            width: 100px;
            height: 100px;
            background-color: bisque;
            float: left;
        }
        .right-son{
            width: 100px;
            height: 100px;
            background-color: rgb(127, 125, 169);
            float: right;
            
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="left-son">左浮动</div>
        <div class="right-son">右浮动</div>
    </div>
    <p>福特房车测试与本地vv的保护以后还会牛股

    </p>
</body>
</html>

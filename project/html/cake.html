<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday WebGL - 3D 互动蛋糕系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cursive: ['Georgia', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050204; }
        .glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-rotate { animation: rotate-slow 10s linear infinite; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="root" class="relative w-full h-full"></div>
    <video id="webcam" class="hidden" autoplay playsinline></video>

    <script>
        // ==========================================
        // 1. src/store.js - 核心轻量化状态管理机制
        // ==========================================
        const AppState = {
            phase: 'cake', // 'cake' | 'blooming' | 'nebula' | 'collapsing'
            gesture: 'NONE', 
            isCameraOn: false,
            activeIndex: 0,
            
            update(key, value) {
                this[key] = value;
                if (key === 'phase') {
                    const el = document.getElementById('ui-phase');
                    if (el) el.innerText = value;
                }
                if (key === 'gesture') {
                    const el = document.getElementById('ui-gesture');
                    if (el) el.innerText = value;
                }
            }
        };

        // ==========================================
        // 2. src/utils/geometry.js - 3D 蛋糕与星云几何数学计算
        // ==========================================
        const GeometryUtils = {
            // 生成双层圆柱体蛋糕点云坐标
            generateCakeCoords: (count) => {
                const positions = [];
                const halfCount = Math.floor(count / 2);
                
                // 下层：大圆柱
                for (let i = 0; i < halfCount; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()) * 2.5; // 半径 2.5
                    const y = (Math.random() - 0.5) * 1.5 - 1.0; // 高度区间 [-1.75, -0.25]
                    
                    const x = Math.cos(theta) * r;
                    const z = Math.sin(theta) * r;
                    positions.push(x, y, z);
                }
                // 上层：小圆柱
                for (let i = halfCount; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const r = Math.sqrt(Math.random()) * 1.6; // 半径 1.6
                    const y = (Math.random() - 0.5) * 1.2 + 0.6; // 高度区间 [0.0, 1.2]
                    
                    const x = Math.cos(theta) * r;
                    const z = Math.sin(theta) * r;
                    positions.push(x, y, z);
                }
                return new Float32Array(positions);
            },
            
            // 生成扩散后的星云形态坐标
            generateNebulaCoords: (count) => {
                const positions = [];
                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const r = 4.5 + Math.random() * 2.5; // 环形内径 4.5，外径 7.0
                    const x = Math.cos(theta) * r;
                    const z = Math.sin(theta) * r;
                    const y = (Math.random() - 0.5) * 1.8; 
                    positions.push(x, y, z);
                }
                return new Float32Array(positions);
            }
        };

        // 24张拍立得测试数据源（包含横竖屏宽高比随机切换）
        const samplePhotos = Array.from({ length: 24 }, (_, i) => ({
            id: i,
            url: `https://picsum.photos/${i % 3 === 0 ? '400/300' : '300/400'}?random=${i}`,
            isLandscape: i % 3 === 0
        }));

        // ==========================================
        // 3. Happy Birthday WebGL 主系统架构
        // ==========================================
        class HappyBirthdayApplication {
            constructor() {
                this.container = document.getElementById('root');
                this.particleCount = 6000; // 升级为 6000 个双层蛋糕粒子
                this.ornamentCount = 120;
                
                this.initEngine();
                this.initLights();
                this.initEnvironment();
                this.buildComponents();
                this.initInteraction();
                this.mountUI();
                this.initMediaPipe();
                
                window.addEventListener('resize', () => this.onWindowResize());
                this.animate();
            }

            // --- src/components/Scene.jsx (环境配置) ---
            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x050204, 0.025);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 1.5, 8.5);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.3;
                this.container.appendChild(this.renderer.domElement);
                
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2(-999, -999);
                this.targetCameraPos = new THREE.Vector3(0, 1.5, 8.5);
                this.targetCameraLookAt = new THREE.Vector3(0, 0, 0);
            }

            initLights() {
                // 暖色主光 (暖橘黄照亮蛋糕主体)
                this.mainLight = new THREE.PointLight(0xff7744, 2.5, 25);
                this.mainLight.position.set(4, 3, 4);
                this.scene.add(this.mainLight);

                // 冷色边缘补光 (青蓝边缘打出马卡龙层次)
                this.coolLight = new THREE.PointLight(0x44aaff, 2.0, 25);
                this.coolLight.position.set(-4, -2, -4);
                this.scene.add(this.coolLight);

                // 顶部神圣感聚光灯
                this.spotLight = new THREE.SpotLight(0xffffff, 4, 20, Math.PI / 5, 0.3, 1);
                this.spotLight.position.set(0, 7, 0);
                this.scene.add(this.spotLight);
            }

            initEnvironment() {
                // 动态闪烁背景 (Stars & Sparkles)
                const starGeo = new THREE.BufferGeometry();
                const starPositions = new Float32Array(1500 * 3);
                for(let i=0; i<1500*3; i++) starPositions[i] = (Math.random() - 0.5) * 50;
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffeebb, size: 0.05, transparent: true, opacity: 0.9 });
                this.sparkles = new THREE.Points(starGeo, starMat);
                this.scene.add(this.sparkles);
            }

            // --- src/components/CakeParticles.jsx (核心 3D 逻辑) ---
            buildComponents() {
                this.cakePositions = GeometryUtils.generateCakeCoords(this.particleCount);
                this.nebulaPositions = GeometryUtils.generateNebulaCoords(this.particleCount);
                
                this.currentParticlePositions = this.cakePositions.slice();
                this.particleVelocities = new Float32Array(this.particleCount * 3);

                this.particleGeo = new THREE.BufferGeometry();
                this.particleGeo.setAttribute('position', new THREE.BufferAttribute(this.currentParticlePositions, 3));
                
                // 蛋糕专属发光粉色粒子材质
                this.particleMat = new THREE.PointsMaterial({
                    color: 0xff66aa,
                    size: 0.06,
                    transparent: true,
                    opacity: 0.85,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });
                this.particleSystem = new THREE.Points(this.particleGeo, this.particleMat);
                this.scene.add(this.particleSystem);

                // 环绕马卡龙五色 PBR 装饰球
                this.ornamentGeo = new THREE.SphereGeometry(0.1, 16, 16);
                const macaronColors = [0xffb7b2, 0xffdac1, 0xe2f0cb, 0xb5ead7, 0xc7ceea]; // 粉、黄、绿、青、紫
                this.ornamentMaterials = macaronColors.map(c => new THREE.MeshStandardMaterial({
                    color: c, metalness: 0.8, roughness: 0.15
                }));

                this.ornamentGroup = new THREE.Group();
                this.ornamentData = [];
                
                for(let i=0; i<this.ornamentCount; i++) {
                    const matIdx = i % macaronColors.length;
                    const mesh = new THREE.Mesh(this.ornamentGeo, this.ornamentMaterials[matIdx]);
                    
                    // 双层环绕排布
                    const isTopLayer = i > this.ornamentCount * 0.4;
                    const theta = Math.random() * Math.PI * 2;
                    const r = isTopLayer ? 1.6 : 2.5;
                    const y = isTopLayer ? 0.6 : -1.0;
                    
                    mesh.position.set(Math.cos(theta)*r, y + (Math.random()-0.5)*0.2, Math.sin(theta)*r);
                    mesh.userData = { 
                        cakePos: mesh.position.clone(),
                        nebulaPos: new THREE.Vector3(Math.cos(theta)*(4.8+Math.random()*1.5), (Math.random()-0.5)*1.2, Math.sin(theta)*(4.8+Math.random()*1.5)),
                    };
                    
                    this.ornamentGroup.add(mesh);
                    this.ornamentData.push(mesh);
                }
                this.scene.add(this.ornamentGroup);

                // 蛋糕顶端发光幸运星
                const starShape = new THREE.ConeGeometry(0.2, 0.5, 4);
                const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
                this.topStar = new THREE.Mesh(starShape, starMaterial);
                this.topStar.position.set(0, 1.6, 0);
                this.scene.add(this.topStar);

                // 拍立得照片墙三维网格
                this.photoGroup = new THREE.Group();
                this.photoMeshes = [];
                
                const photoFrameGeo = new THREE.PlaneGeometry(1.2, 1.5);
                const innerTextureGeo = new THREE.PlaneGeometry(1.0, 1.1);

                samplePhotos.forEach((photo, idx) => {
                    const singlePhotoContainer = new THREE.Group();
                    
                    const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
                    const frameMesh = new THREE.Mesh(photoFrameGeo, frameMat);
                    singlePhotoContainer.add(frameMesh);

                    // 智能横竖版自适应：宽屏照片顺时针旋转90度
                    if(photo.isLandscape) {
                        frameMesh.rotation.z = Math.PI / 2;
                    }

                    const loader = new THREE.TextureLoader();
                    loader.crossOrigin = 'anonymous'; 
                    const innerMat = new THREE.MeshBasicMaterial({ color: 0xdddddd });
                    loader.load(photo.url, (tex) => {
                        innerMat.map = tex;
                        innerMat.needsUpdate = true;
                    });
                    
                    const innerMesh = new THREE.Mesh(innerTextureGeo, innerMat);
                    innerMesh.position.z = 0.015; 
                    if(photo.isLandscape) innerMesh.rotation.z = Math.PI / 2;
                    singlePhotoContainer.add(innerMesh);

                    // 星云形态下的环形星轨几何排布
                    const angle = (idx / samplePhotos.length) * Math.PI * 2;
                    const radius = 5.5;
                    singlePhotoContainer.position.set(Math.cos(angle)*radius, 0, Math.sin(angle)*radius);
                    singlePhotoContainer.lookAt(0, 0, 0);
                    
                    singlePhotoContainer.scale.set(0.001, 0.001, 0.001); // 默认隐藏
                    singlePhotoContainer.userData = { angle, index: idx };

                    this.photoGroup.add(singlePhotoContainer);
                    this.photoMeshes.push(singlePhotoContainer);
                });
                this.scene.add(this.photoGroup);
            }

            // --- 鼠标移动水波纹斥力交互 ---
            initInteraction() {
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                });
                
                window.addEventListener('click', () => {
                    if (AppState.phase !== 'nebula') return;
                    this.raycaster.setFromCamera(this.mouse, this.camera);
                    const intersects = this.raycaster.intersectObjects(this.photoGroup.children, true);
                    
                    if (intersects.length > 0) {
                        let obj = intersects[0].object;
                        while(obj.parent && obj.parent !== this.photoGroup) {
                            obj = obj.parent;
                        }
                        this.focusPhoto(obj);
                    }
                });
            }

            focusPhoto(photoObj) {
                const idx = photoObj.userData.index;
                AppState.update('activeIndex', idx);
                
                const angle = photoObj.userData.angle;
                const camR = 3.5; 
                this.targetCameraPos.set(Math.cos(angle)*camR, 0.3, Math.sin(angle)*camR);
                this.targetCameraLookAt.set(Math.cos(angle)*5.5, 0, Math.sin(angle)*5.5);
            }

            // --- src/components/HandTracker.jsx (视觉手势绑定) ---
            initMediaPipe() {
                this.hands = new Hands({
                    locateFile: (file) => `https://unpkg.com/@mediapipe/hands/${file}`
                });

                this.hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.75,
                    minTrackingConfidence: 0.75
                });

                this.hands.onResults((results) => {
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        const landmarks = results.multiHandLandmarks[0];
                        
                        const indexOpen = landmarks[8].y < landmarks[6].y;
                        const middleOpen = landmarks[12].y < landmarks[10].y;
                        const ringOpen = landmarks[16].y < landmarks[14].y;
                        const pinkyOpen = landmarks[20].y < landmarks[18].y;
                        
                        let currentGesture = 'NONE';
                        if (indexOpen && middleOpen && ringOpen && pinkyOpen) {
                            currentGesture = 'OPEN_PALM';
                        } else if (!indexOpen && !middleOpen && !ringOpen && !pinkyOpen) {
                            currentGesture = 'CLOSED_FIST';
                        }

                        AppState.update('gesture', currentGesture);
                        this.handleGestureTrigger(currentGesture, landmarks);
                    } else {
                        AppState.update('gesture', 'NONE');
                    }
                });

                this.webcamElement = document.getElementById('webcam');
                this.cameraUtils = new Camera(this.webcamElement, {
                    onFrame: async () => {
                        if (AppState.isCameraOn) {
                            await this.hands.send({ image: this.webcamElement });
                        }
                    },
                    width: 320,
                    height: 240
                });
            }

            handleGestureTrigger(gesture, landmarks) {
                const currentPhase = AppState.phase;
                
                if (gesture === 'OPEN_PALM' && currentPhase === 'cake') {
                    this.triggerBlooming();
                } else if (gesture === 'CLOSED_FIST' && currentPhase === 'nebula') {
                    this.triggerCollapsing();
                } else if (gesture === 'OPEN_PALM' && currentPhase === 'nebula') {
                    // 星云状态下手势左右滑动控制照片墙旋转
                    const handX = landmarks[9].x; 
                    if(handX < 0.35) {
                        this.photoGroup.rotation.y += 0.04; 
                    } else if(handX > 0.65) {
                        this.photoGroup.rotation.y -= 0.04; 
                    }
                }
            }

            // --- 四阶段复杂过渡状态机控制 (GSAP 驱动) ---
            triggerBlooming() {
                AppState.update('phase', 'blooming');
                const tl = gsap.timeline({
                    onComplete: () => {
                        AppState.update('phase', 'nebula');
                    }
                });

                tl.to(this.particleMat, { size: 0.14, duration: 0.4, ease: "power2.out" });
                
                // 物理点云急速炸裂爆发开
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    tl.to(this.currentParticlePositions, {
                        [i3]: this.nebulaPositions[i3] * 1.4,
                        [i3+1]: this.nebulaPositions[i3+1] * 1.4,
                        [i3+2]: this.nebulaPositions[i3+2] * 1.4,
                        duration: 1.3,
                        ease: "bounce.out"
                    }, 0);
                }

                this.ornamentData.forEach(mesh => {
                    tl.to(mesh.position, {
                        x: mesh.userData.nebulaPos.x * 1.1,
                        y: mesh.userData.nebulaPos.y * 1.1,
                        z: mesh.userData.nebulaPos.z * 1.1,
                        duration: 1.5,
                        ease: "power3.out"
                    }, 0);
                });

                tl.to(this.topStar.scale, { x:0, y:0, z:0, duration: 0.4 }, 0);

                // 24张拍立得高调出场
                this.photoMeshes.forEach(mesh => {
                    tl.to(mesh.scale, { x: 1, y: 1, z: 1, duration: 1.1, ease: "back.out(1.5)" }, 0.5);
                });
                
                // 相机智能拉远，鸟瞰梦幻星云
                this.targetCameraPos.set(0, 4.5, 12);
                this.targetCameraLookAt.set(0, 0, 0);
            }

            triggerCollapsing() {
                AppState.update('phase', 'collapsing');
                const tl = gsap.timeline({
                    onComplete: () => {
                        AppState.update('phase', 'cake');
                        this.targetCameraPos.set(0, 1.5, 8.5);
                        this.targetCameraLookAt.set(0, 0, 0);
                    }
                });

                this.photoMeshes.forEach(mesh => {
                    tl.to(mesh.scale, { x: 0.001, y: 0.001, z: 0.001, duration: 0.5 }, 0);
                });

                // 粒子回缩重聚为精美的蛋糕形状
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    tl.to(this.currentParticlePositions, {
                        [i3]: this.cakePositions[i3],
                        [i3+1]: this.cakePositions[i3+1],
                        [i3+2]: this.cakePositions[i3+2],
                        duration: 1.4,
                        ease: "power4.inOut"
                    }, 0);
                }

                this.ornamentData.forEach(mesh => {
                    tl.to(mesh.position, {
                        x: mesh.userData.cakePos.x,
                        y: mesh.userData.cakePos.y,
                        z: mesh.userData.cakePos.z,
                        duration: 1.4,
                        ease: "power4.inOut"
                    }, 0);
                });

                tl.to(this.topStar.scale, { x:1, y:1, z:1, duration: 0.7 }, 0.7);
                tl.to(this.particleMat, { size: 0.06, duration: 0.5 }, 0.9);
            }

            // --- 高频帧率流体力学结算循环器 ---
            animate() {
                requestAnimationFrame(() => this.animate());

                const phase = AppState.phase;

                // 镜头平滑插值随动
                this.camera.position.lerp(this.targetCameraPos, 0.05);
                this.camera.lookAt(this.targetCameraLookAt);

                // 场景基础旋转自转
                if(phase === 'cake' || phase === 'collapsing') {
                    this.particleSystem.rotation.y += 0.004;
                    this.ornamentGroup.rotation.y += 0.004;
                } else if(phase === 'nebula') {
                    this.photoGroup.rotation.y += 0.0015; 
                }

                // 计算流体斥力（仅在完整蛋糕形态下触发）
                if (phase === 'cake') {
                    this.raycaster.setFromCamera(this.mouse, this.camera);
                    const posAttr = this.particleGeo.attributes.position;
                    
                    const spacePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
                    const intersectPoint = new THREE.Vector3();
                    this.raycaster.ray.intersectPlane(spacePlane, intersectPoint);

                    for (let i = 0; i < this.particleCount; i++) {
                        const i3 = i * 3;
                        const pX = this.currentParticlePositions[i3];
                        const pY = this.currentParticlePositions[i3+1];

                        const dx = pX - intersectPoint.x;
                        const dy = pY - intersectPoint.y;
                        const dist = Math.hypot(dx, dy);

                        // 遭遇鼠标：添加斥力加速度
                        if (dist < 1.4) { 
                            const force = (1.4 - dist) * 0.16;
                            this.particleVelocities[i3] += (dx / dist) * force;
                            this.particleVelocities[i3+1] += (dy / dist) * force;
                        }

                        // 弹簧恢复力约束拉回初始蛋糕形态
                        const homeX = this.cakePositions[i3];
                        const homeY = this.cakePositions[i3+1];
                        
                        this.particleVelocities[i3] += (homeX - pX) * 0.045;
                        this.particleVelocities[i3+1] += (homeY - pY) * 0.045;
                        
                        // 流体空气阻尼粘度
                        this.particleVelocities[i3] *= 0.84;
                        this.particleVelocities[i3+1] *= 0.84;

                        this.currentParticlePositions[i3] += this.particleVelocities[i3];
                        this.currentParticlePositions[i3+1] += this.particleVelocities[i3+1];
                    }
                    posAttr.needsUpdate = true;
                } else if (phase === 'nebula') {
                    // 星云形态下粒子产生微弱的动态呼吸波动
                    const posAttr = this.particleGeo.attributes.position;
                    for (let i = 0; i < this.particleCount; i++) {
                        const i3 = i * 3;
                        this.currentParticlePositions[i3] += Math.sin(Date.now()*0.0012 + i)*0.002;
                        this.currentParticlePositions[i3+1] += Math.cos(Date.now()*0.0016 + i)*0.002;
                    }
                    posAttr.needsUpdate = true;
                }

                this.sparkles.rotation.y += 0.0006;
                this.renderer.render(this.scene, this.camera);
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- src/components/UI.jsx (玻璃拟态 UI 布局) ---
            mountUI() {
                const uiContainer = document.createElement('div');
                uiContainer.className = "absolute inset-0 pointer-events-none z-10 flex flex-col justify-between p-6 text-white";
                
                uiContainer.innerHTML = `
                    <div class="flex justify-between items-start w-full pointer-events-auto">
                        <div class="glass p-4 rounded-xl flex flex-col gap-1 text-sm max-w-xs">
                            <div class="text-pink-400 font-bold flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-pink-400 animate-ping"></span>
                                AR 互动控制台
                            </div>
                            <div>场景阶段: <span id="ui-phase" class="font-mono text-amber-300">cake</span></div>
                            <div>手势决策: <span id="ui-gesture" class="font-mono text-cyan-300">NONE</span></div>
                            <div class="text-xs text-gray-400 mt-2">交互指引：对着摄像头[张开五指]触发爆炸形态；在星云中[握紧拳头]回归复原蛋糕。</div>
                        </div>
                        
                        <div class="glass p-3 rounded-2xl flex flex-col items-center gap-2">
                            <div class="w-32 h-24 bg-black/50 rounded-lg overflow-hidden relative border border-white/10">
                                <div id="cam-closed-placeholder" class="absolute inset-0 flex items-center justify-center text-xs text-gray-500">CAM OFF</div>
                            </div>
                            <button id="btn-cam" class="pointer-events-auto px-4 py-1.5 bg-white/10 hover:bg-white/20 active:scale-95 transition text-xs rounded-full font-medium border border-white/10">
                                OPEN CAMERA
                            </button>
                        </div>
                    </div>

                    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center w-full">
                        <h1 class="font-cursive text-5xl md:text-7xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-rose-400 to-amber-400 drop-shadow-[0_0_20px_rgba(244,63,94,0.5)]">
                            Happy Birthday
                        </h1>
                        <p class="text-[10px] tracking-[0.5em] uppercase text-gray-400/70 mt-4 font-light">3D WebGL Creative Interaction</p>
                    </div>

                    <div class="w-full flex justify-center pointer-events-auto mb-4">
                        <div class="glass px-6 py-3 rounded-full flex items-center gap-4 border border-white/10 shadow-xl shadow-black/40">
                            <div id="music-disc" class="w-8 h-8 rounded-full bg-gradient-to-tr from-pink-500 to-rose-500 flex items-center justify-center cursor-pointer shadow-md">
                                <svg class="w-4 h-4 text-white animate-rotate" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                                </svg>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-xs font-semibold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-300">Happy Birthday (Ambient Mix)</span>
                                <span class="text-[10px] text-gray-400 font-light">Interactive Spatial Audio</span>
                            </div>
                            <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
                        </div>
                    </div>
                `;
                this.container.appendChild(uiContainer);

                const btnCam = document.getElementById('btn-cam');
                const camPlaceholder = document.getElementById('cam-closed-placeholder');
                const bgm = document.getElementById('bgm');
                const musicDisc = document.getElementById('music-disc');

                btnCam.addEventListener('click', () => {
                    const isOn = !AppState.isCameraOn;
                    AppState.update('isCameraOn', isOn);
                    
                    if(isOn) {
                        this.webcamElement.classList.remove('hidden');
                        this.cameraUtils.start();
                        btnCam.innerText = "CLOSE CAMERA";
                        btnCam.classList.add("bg-rose-500/20", "text-rose-300");
                        camPlaceholder.classList.add('hidden');
                    } else {
                        this.cameraUtils.stop();
                        btnCam.innerText = "OPEN CAMERA";
                        btnCam.classList.remove("bg-rose-500/20", "text-rose-300");
                        camPlaceholder.classList.remove('hidden');
                    }
                });

                // 播放器状态流转
                let isPlaying = false;
                musicDisc.addEventListener('click', () => {
                    if(!isPlaying) {
                        bgm.play().catch(()=>{});
                        musicDisc.classList.add('shadow-[0_0_15px_rgba(244,63,94,0.7)]');
                    } else {
                        bgm.pause();
                        musicDisc.classList.remove('shadow-[0_0_15px_rgba(244,63,94,0.7)]');
                    }
                    isPlaying = !isPlaying;
                });

                // 状态机订阅同步
                AppState.update('phase', 'cake');
                AppState.update('gesture', 'NONE');
            }
        }

        // 入口激活
        window.addEventListener('DOMContentLoaded', () => {
            new HappyBirthdayApplication();
        });
    </script>
</body>
</html>
